<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabelProMax MES — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .login-title {
            font-size: 28px;
            font-weight: bold;
            color: #e6edf3;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .login-sub {
            font-size: 13px;
            color: #6a8aaa;
            margin-bottom: 32px;
        }
        .login-card {
            background: #12263a;
            border-radius: 12px;
            padding: 36px 40px;
            box-shadow: 0 0 32px rgba(0,0,0,0.4);
            width: 380px;
        }
        .role-select {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .role-btn {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: 2px solid #24364d;
            background: #0d1e2e;
            color: #6a8aaa;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            user-select: none;
        }
        .role-btn:hover { border-color: #2d8cff; color: #e6edf3; }
        .role-btn.selected { border-color: #2d8cff; background: #1a3350; color: #e6edf3; }

        .pin-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }
        .pin-section label {
            font-size: 12px;
            color: #9fc4ff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .pin-section input {
            padding: 12px 14px;
            border-radius: 6px;
            border: 1px solid #24364d;
            background: #0d1e2e;
            color: #e6edf3;
            font-size: 20px;
            width: 100%;
            box-sizing: border-box;
            letter-spacing: 6px;
            transition: border-color 0.15s;
        }
        .pin-section input:focus { outline: none; border-color: #2d8cff; }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2d8cff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s;
        }
        .login-btn:hover { background: #1a7ae0; }
        .login-btn:disabled { background: #1a3350; color: #4a6a8a; cursor: not-allowed; }

        .error-msg {
            background: #2a1020;
            border: 1px solid #c0394a;
            color: #ff7a8a;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
        }
        .login-footer {
            font-size: 12px;
            color: #4a6a8a;
            text-align: center;
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-title">LabelProMax MES</div>
        <div class="login-sub">Manufacturing Execution System</div>

        <div class="login-card">
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form method="POST" id="loginForm">
                <input type="hidden" name="role" id="roleInput" value="">

                <div class="role-select">
                    <div class="role-btn" id="btnViewer" onclick="selectRole('viewer')">
                        👁 Viewer
                    </div>
                    <div class="role-btn" id="btnOperator" onclick="selectRole('operator')">
                        🔧 Operator
                    </div>
                </div>

                <div class="pin-section">
                    <label>PIN</label>
                    <input type="password" name="pin" id="pinInput"
                           maxlength="12" placeholder="••••" autocomplete="off">
                </div>

                <button type="submit" class="login-btn" id="submitBtn" disabled>
                    Select a role
                </button>
            </form>

            <div class="login-footer">Select a role then enter your PIN to continue.</div>
        </div>
    </div>

    <script>
        function selectRole(role) {
            document.getElementById('roleInput').value = role;
            document.getElementById('btnViewer').classList.toggle('selected', role === 'viewer');
            document.getElementById('btnOperator').classList.toggle('selected', role === 'operator');
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.textContent = role === 'viewer' ? 'Enter as Viewer' : 'Login as Operator';
            document.getElementById('pinInput').focus();
        }
    </script>
</body>
</html>
